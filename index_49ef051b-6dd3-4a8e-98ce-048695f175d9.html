<!DOCTYPE html>
<html>
  <head>
    <title>Hello, World!</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
      <h2>Форма реєстрації</h1>
      <form>
      <p>
<label for="firstName">Iм'я</label>
<input type="text" id="firstName">
</p>
<p>
<label for="email">Електронна пошта :< /label>
<input type="email" id="email">
</p>
<p>
<label for="password">Пароль :< /label>
<input type="password" id="password">
</p>
<p>
<label for="confirmPassword">Підтвердження паролю :< /label>
<input type="password" id="confirmPassword">
</p>
<p>
<label for="age">Biк :< /label>
<input type="number" id="age" min="1" max="100">
</p>
<p>
<label for="gender">Стать :< /label>
<select id="gender">
<option value="male">Чоловіча</option>
<option value="female">Жіноча</option>
<option value="other">Iнша</option>
</select>
</p>
<label for="terms">
Я погоджуюсь з умовами використання
<input type="checkbox" id="terms">

<button type="submit">Зареєструватися</button>
</label>
</form>
</body>
</html>
